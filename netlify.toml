# =============================================
# Netlify Configuration — SPI Website
# =============================================

[build]
  # Folder Netlify will deploy
  publish = "dist"
  # Command Netlify runs to build the site
  command = "npm run build"

# ── SPA Routing Fix ──────────────────────────
# Without this, refreshing any page (e.g. /about)
# gives a 404. This redirects all routes to index.html
# so React Router handles them.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers ─────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache static assets ──────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
